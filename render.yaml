services:
  - type: web
    name: ocr-document-processing-system
    env: python
    rootDir: backend

    buildCommand: >
      apt-get update &&
      apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-kan tesseract-ocr-hin tesseract-ocr-tam tesseract-ocr-tel tesseract-ocr-mal tesseract-ocr-ben tesseract-ocr-guj tesseract-ocr-mar tesseract-ocr-pan tesseract-ocr-urd poppler-utils &&
      pip install -r requirements.txt

    startCommand: gunicorn app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13